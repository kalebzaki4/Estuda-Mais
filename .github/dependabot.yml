# Arquivo: .github/dependabot.yml
version: 2
updates:
  # 1. Configuração para o Frontend (React/Vite)
  # Verifique se a sua pasta se chama "frontend" ou "web"
  - package-ecosystem: "npm"
    directory: "/frontend" 
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - "frontend"
      - "dependencies"

  # 2. Configuração para o Backend (Java/Maven)
  # Se o seu arquivo pom.xml estiver na raiz da pasta "backend"
  - package-ecosystem: "maven"
    directory: "/backend" 
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - "backend"
      - "java"

  # 3. Monitorar as GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "ci/cd"
